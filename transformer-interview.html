          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p>Self-Attention 的核心思想是：<strong>让序列中的每个 token 都能"看到"所有其他 token，并根据相关性动态加权聚合信息</strong>。不再依赖固定窗口或递推结构。</p>
    <p><strong>数学推导（Scaled Dot-Product Attention）：</strong></p>
    <pre><code>给定输入序列 X ∈ ℝ^(n×d)，通过三个可学习的权重矩阵投影：

Q = X · W_Q    (Query:  我要查什么)
K = X · W_K    (Key:    我有什么标签)
V = X · W_V    (Value:  我包含什么内容)

Attention(Q, K, V) = softmax( Q·K^T / √d_k ) · V

步骤分解：
1. Q·K^T      → 计算每对 token 的"匹配分数" (n×n 注意力矩阵)
2. / √d_k     → 缩放，防止点积过大导致 softmax 梯度消失
3. softmax()  → 将分数归一化为概率分布（每行和为 1）
4. · V        → 按注意力权重对 Value 加权求和</code></pre>
    <p><strong>物理直觉：</strong>每个 token 发出 Query（"我在找什么"），检查所有 token 的 Key（"我有什么"），匹配度决定从 Value（"我的内容"）中取多少信息。</p>
    </div>
  `

          id: "q2", num: "2",
          title: "为什么 Self-Attention 中要除以 √d_k（缩放因子）？不除以会怎样？",
          tags: [{text:"高频必考",cls:"hot"}, {text:"细节理解",cls:"core"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p>除以 √d_k 是为了<strong>防止点积的方差随维度增大而增大</strong>，从而避免 softmax 进入梯度极小的饱和区。</p>
    <ul>
      <li><strong>不除以 √d_k 的后果：</strong>当 d_k 较大时（如 64），Q 和 K 的点积值会很大（方差 ≈ d_k）。大值输入 softmax 后，输出分布变得极度尖锐（接近 one-hot）→ 梯度接近 0 → 模型无法学习。</li>
      <li><strong>除以 √d_k 后：</strong>点积的方差被归一化到 1 左右，softmax 输出保持适中的熵，梯度能正常反向传播。</li>
    </ul>
    <pre><code># 假设 q, k 是独立的标准正态分布 N(0,1)
# q·k = Σ q_i·k_i,  方差 = d_k
# q·k / √d_k 的方差 = d_k / d_k = 1  ✓  保持稳定</code></pre>
    </div>
  `

      <tr><td>Sliding Window</td><td>O(n·w·d)</td><td>限制注意力窗口大小 w（如 Mistral 的 4096）</td></tr>
    </table>
    </div>
  `

    <p>注意力矩阵的稀疏性假设认为：<strong>每个 token 真正需要关注的 token 只是少数几个</strong>，而非全部。注意力矩阵中大部分权重应该接近 0。</p>

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p>Multi-Head Attention 将 Q、K、V 分别投影到 h 个不同的<strong>低维子空间</strong>（每个维度 d_k = d_model / h）。核心原因：</p>
    <ol>
      <li><strong>多角度关注</strong>：不同头可以关注不同类型的关系——一个头关注语法依存，一个头关注语义相似，一个头关注位置近邻。</li>
      <li><strong>表达能力增强</strong>：单头注意力的表达空间受限，多头的并集覆盖了更丰富的特征组合。</li>
      <li><strong>训练稳定性</strong>：多头的平均效应可以降低单个注意力头的方差。</li>
    </ol>
    <pre><code>MultiHead(Q, K, V) = Concat(head_1, ..., head_h) · W_O

其中 head_i = Attention(Q·W_Qi, K·W_Ki, V·W_Vi)

W_Qi, W_Ki, W_Vi ∈ ℝ^(d_model × d_k)
W_O ∈ ℝ^(h·d_k × d_model)

通常 d_k = d_model / h，如 d_model=512, h=8 → d_k=64</code></pre>
    </div>
  `

        <ul>
          <li>位置头：关注相邻/固定偏移 token</li>
          <li>语法头：关注句法依存关系（主语-动词、代词-先行词）</li>
          <li>语义头：关注语义相关的 token</li>

    <div class="highlight-box">💡 研究发现：大量注意力头在推理时是<strong>冗余的</strong>——剪掉 50% 甚至 80% 的头后模型性能下降很小。这启发了结构化剪枝和动态头选择技术。</div>
    </div>
  `

    <ul>
      <li><strong>Self-Attention</strong> 在 Encoder 中：每个 token 关注整个输入序列的上下文。</li>
      <li><strong>Self-Attention</strong> 在 Decoder 中：使用 Causal Mask（掩码），每个 token 只能看到自己和之前的 token。</li>

    </ul>
    </div>

    <p>Causal Attention 通过一个<strong>上三角遮罩矩阵（Mask）</strong>，强制第 i 个 token 只能关注第 0 到 i 个 token（当前位置及之前的 token），不能"偷看"未来的 token。</p>
    <pre><code>Mask 矩阵 (n=4):        注意力权重 (softmax 后):
[ 0  -∞ -∞ -∞]         [1.0  0    0    0 ]
[ 0   0 -∞ -∞]         [0.3 0.7   0    0 ]
[ 0   0  0 -∞]         [0.2 0.3 0.5   0 ]
[ 0   0  0  0]         [0.1 0.2 0.3 0.4]</code></pre>
    <p><strong>为什么 Decoder 必须用它？</strong></p>
    <ul>
      <li><strong>自回归生成</strong>：Decoder 逐个生成 token，生成时未来的 token 还不存在，自然不能关注。</li>
      <li><strong>训练时并行</strong>：训练时已知完整序列，但需要用 Mask 模拟推理时的自回归约束，否则就是"作弊"（信息泄露）。</li>
    </ul>
    </div>
  `

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p>Self-Attention 本质上是<strong>置换等变性（Permutation Equivariance）</strong>——打乱输入序列的顺序，输出的顺序也相应打乱，但每个位置的输出值不变。</p>
    <p>"A 爱 B" 和 "B 爱 A" 在不加位置编码时，Self-Attention 无法区分两者，因为 token 间的注意力权重只取决于内容，不取决于位置。</p>
    <p><strong>位置编码的作用：</strong>在输入 embedding 上叠加/拼接位置信息，打破置换等变性，让模型能够区分"第一个 token"和"第二个 token"。</p>
    </div>
  `

          title: "Sinusoidal Positional Encoding（正弦位置编码）的公式是什么？为什么用 sin/cos？",

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <pre><code>PE(pos, 2i)   = sin(pos / 10000^(2i/d_model))
PE(pos, 2i+1) = cos(pos / 10000^(2i/d_model))

其中 pos = 位置, i = 维度索引, d_model = 模型维度</code></pre>
    <p><strong>设计原因：</strong></p>
    <ol>
      <li><strong>不同频率 → 多尺度位置信息</strong>：低维度对应低频（波长长，区分大范围位置），高维度对应高频（波长短，区分相邻位置）。</li>
      <li><strong>相对位置的可表达性</strong>：由于 sin(a+b) = sin(a)cos(b) + cos(a)sin(b)，PE(pos+k) 可以表示为 PE(pos) 的线性变换，使得模型能学习相对位置关系。</li>
      <li><strong>值域有界</strong>：[-1, 1] 范围内，数值稳定。</li>
      <li><strong>可外推</strong>：理论上可以推广到训练时未见过的长度，无需重新训练（虽然实际效果有限）。</li>
    </ol>
    </div>
  `

          title: "RoPE（旋转位置编码）的原理是什么？为什么主流大模型（LLaMA、Qwen）都用它？",
          tags: [{text:"高频必考",cls:"hot"}, {text:"现代方法",cls:"core"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>RoPE（Rotary Position Embedding）</strong> 通过<strong>旋转矩阵</strong>将位置信息编码到 Q 和 K 中，使得 Q·K 的点积结果只取决于两个 token 的<strong>相对位置</strong>。</p>
    <pre><code>核心公式：
q_m = R_m · W_Q · x_m     (对位置 m 的 Query 施加旋转)
k_n = R_n · W_K · x_n     (对位置 n 的 Key 施加旋转)

其中 R_m 是一个分块对角旋转矩阵：
R_m = [[cos(mθ₁), -sin(mθ₁)],    # 对第 0,1 维旋转
       [sin(mθ₁),  cos(mθ₁)],
       [cos(mθ₂), -sin(mθ₂)],    # 对第 2,3 维旋转
       ...]

点积结果：
q_m · k_n = (R_m W_Q x_m) · (R_n W_K x_n)
          = x_m^T W_Q^T R_{n-m} W_K x_n  ← 只依赖相对位置 (n-m)</code></pre>
    <p><strong>为什么主流模型都用它：</strong></p>
    <ul>
      <li><strong>相对位置天然编码</strong>：直接内置于 attention 计算中，无需额外位置向量。</li>
      <li><strong>外推性好</strong>：通过调整 θ 频率（如 NTK-aware scaling），可以较好地扩展到更长的序列。</li>
      <li><strong>效率高</strong>：实现简单，不增加额外参数，可作为逐元素操作高效计算。</li>
    </ul>
    </div>
  `

      <li>Decoder 通过 Cross-Attention 融合 Encoder 表示</li>
      <li>输出投影到词汇表 → softmax → 交叉熵损失（与真实目标序列比较）</li>

    <ul>
      <li><strong>优点</strong>：训练稳定、收敛快、可并行计算所有位置。</li>
      <li><strong>缺点</strong>：训练-推理不一致（Exposure Bias）→ 推理时一步错可能导致后续全错。</li>
    </ul>
    <p>缓解 Exposure Bias 的方法：Scheduled Sampling（逐渐用模型自己的输出替换部分 ground truth）。</p>
    </div>

          id: "q20", num: "20",
          title: "请详细解释 KV Cache 的原理，以及为什么它能大幅加速自回归推理。",
          tags: [{text:"高频必考",cls:"hot"}, {text:"推理优化",cls:"core"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>KV Cache</strong> 是 Decoder 推理时的核心优化：缓存已生成 token 的 Key 和 Value，避免每一步重复计算。</p>
    <p><strong>为什么能加速：</strong></p>
    <ol>
      <li>自回归生成时，第 t 步只需要计算新 token 的 Q、K、V</li>
      <li>前 t-1 个 token 的 K 和 V 在上一步已经计算过</li>
      <li>将它们缓存起来，第 t 步只做增量计算：新 Q 与所有历史 K 做 attention</li>
    </ol>
    <pre><code># 无 KV Cache — O(n²·d) 每步
Step 1: 计算 token₀ 的 Q,K,V → attention(Q₀,K₀,V₀)
Step 2: 计算 token₀,₁ 的 Q,K,V → attention(Q₁,[K₀,K₁],[V₀,V₁])  ← 重复计算 K₀,V₀
Step 3: 计算 token₀,₁,₂ 的 Q,K,V → ...                          ← 重复更多

# 有 KV Cache — O(n·d) 每步的新计算
Step 1: 计算 token₀ 的 Q,K,V → attention(Q₀,K₀,V₀) → 缓存 K₀,V₀
Step 2: 计算 token₁ 的 Q,K,V → attention(Q₁,[K₀,K₁],[V₀,V₁]) → 追加缓存 K₁,V₁
Step 3: 计算 token₂ 的 Q,K,V → attention(Q₂,[K₀,K₁,K₂],[V₀,V₁,V₂]) → ...</code></pre>
    <p><strong>内存分析：</strong>KV Cache 占用 = 2 × n_layers × n_heads × d_head × seq_len × dtype_size。长序列下内存可能非常大（如 LLaMA-7B 在 2048 token 时 KV Cache ≈ 1GB）。</p>
    </div>
  `

          title: "什么是 FlashAttention？它为什么比标准 Attention 更快？",

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>FlashAttention</strong> 是一种 IO-Aware 的精确注意力算法。它不改变数学结果，而是通过优化<strong>GPU 内存访问模式</strong>来加速。</p>
    <p><strong>核心思想 — Tiling（分块计算）：</strong></p>
    <ol>
      <li>标准 Attention 需要将完整的 n×n 注意力矩阵写入 HBM（高带宽显存），这是最大的瓶颈。</li>
      <li>FlashAttention 将 Q、K、V 分成小块，在 SRAM（片上共享内存）中逐块计算 softmax，避免将整个注意力矩阵写入 HBM。</li>
      <li>使用 Online Softmax 技巧（tiling + rescaling），保证分块计算与全局计算数学等价。</li>
    </ol>
    <pre><code>标准 Attention：
Q,K,V [HBM] → 计算 S=QK^T [写入 HBM] → softmax(S) [读写 HBM]
→ 计算 SV [写入 HBM]     ← 大量 HBM 读写

FlashAttention：
for 每个 Q 块:
    for 每个 K,V 块:
        S_block = Q_block @ K_block^T  [SRAM]
        S_block 做 online softmax       [SRAM]
        累加加权 V_block                 [SRAM]
    输出 O_block [写回 HBM]    ← 只写一次最终结果</code></pre>
    <p><strong>效果：</strong>训练速度 2-4× 提升，显存 O(n) 而非 O(n²)，允许训练更长的序列。</p>
    </div>
  `

RMSNorm(x)  = γ · x / √(mean(x²) + ε)
              只做缩放，去除均值的中心和偏移

对比：
- RMSNorm 去掉了"去均值"操作，速度提升约 10-15%
- 实验表明去掉去均值不影响性能
- LLaMA、T5、Mistral 等均采用 RMSNorm</code></pre>
    </div>

      <li><strong>ALiBi</strong>：天然的线性偏置让模型天生支持外推。</li>
    </ol>

    <p><strong>SwiGLU</strong> 是一种门控激活函数，结合了 Swish 和 Gated Linear Unit：</p>
    <pre><code>ReLU FFN:
FFN(x) = ReLU(x·W₁ + b₁)·W₂ + b₂

SwiGLU FFN:
FFN(x) = (SiLU(x·W_gate) ⊙ (x·W_up)) · W_down
       = Swish(x·W_gate) ⊙ (x·W_up) · W_down

其中 SiLU(x) = x·σ(x)，σ 是 sigmoid
⊙ 表示逐元素乘法（门控）</code></pre>
    <p><strong>优势：</strong></p>
    <ul>
      <li><strong>门控机制</strong>：Swish(x·W_gate) 输出 0~x 之间的门控值，控制信息流。类似 LSTM/GRU 的门控思想。</li>
      <li><strong>平滑的非线性</strong>：SiLU 处处可导，没有 ReLU 在 x=0 处的不可导问题。</li>
      <li><strong>更好的性能</strong>：在相同参数量下，SwiGLU 普遍优于 ReLU。</li>
    </ul>
    <p>注：使用 SwiGLU 时，通常将 FFN 中间维度缩小（从 4× 调整为约 8/3×），以保持参数量不变。</p>
    </div>

          id: "q25", num: "25",
          title: "Mixture of Experts (MoE) 是如何与 Transformer 结合的？解决了什么问题？带来了什么新挑战？",
          tags: [{text:"前沿架构",cls:"hot"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>MoE</strong> 将 Transformer 的 FFN 层替换为<strong>多个专家 FFN + 一个路由网络</strong>：</p>
    <pre><code>标准 FFN:
y = FFN(x)

MoE FFN:
router_logits = x · W_router              # 路由网络计算分数
weights = softmax(TopK(router_logits))    # 选 Top-K 个专家，归一化权重
y = Σ weights_i · Expert_i(x)             # 加权求和选中专家的输出</code></pre>
    <p><strong>解决的痛点：</strong>增加模型容量而<strong>不线性增加计算量</strong>。如 Mixtral 8×7B：8 个专家，每次只激活 2 个，总参数 47B，推理成本 ≈ 13B 模型。</p>
    <p><strong>新挑战：</strong></p>
    <ul>
      <li>负载均衡：路由可能坍缩到少数专家（需要负载均衡损失）</li>
      <li>通信开销：专家分布在多卡上时，token 需要在卡间路由</li>
      <li>训练稳定性：需要辅助损失（Load Balancing Loss + Router Z-Loss）</li>
      <li>显存占用：所有专家都需要加载到显存（虽然只计算部分）</li>
    </ul>
    </div>
  `

      <tr><td>能否生成</td><td>不能直接生成</td><td>天然支持生成</td></tr>
    </table>
    <p><strong>BERT 不能生成的原因：</strong>BERT 的双向注意力意味着每个位置的输出依赖于整个序列的信息。如果要逐 token 生成，每生成一个新 token 都需要重新编码整个序列，这不可行。而且 BERT 没有自回归的训练目标。</p>
    </div>

          tags: [{text:"正则化",cls:"core"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p>Transformer 中 Dropout 的常见位置：</p>
    <ol>
      <li><strong>Attention Dropout</strong>：在 softmax 后的注意力权重上做 Dropout（随机置零某些注意力连接）。防止过度依赖特定的 token 对。</li>
      <li><strong>Residual Dropout</strong>：在每个子层的输出加到残差路径之前做 Dropout。防止过拟合，是作用最大的 Dropout 位置。</li>
      <li><strong>FFN Dropout</strong>：在 FFN 的激活函数之后做 Dropout。</li>
      <li><strong>Embedding Dropout</strong>：在 Embedding 层之后做 Dropout。</li>
    </ol>
    <p>注意：现代大模型（GPT-3+、LLaMA）<strong>趋向于减少或不使用 Dropout</strong>。因为数据量足够大，加上 Pre-Norm 本身就有正则化作用，Dropout 反而会降低训练效率和最终性能。</p>
    </div>

      <li><strong>线性注意力</strong>：用核函数替换 softmax 来交换计算顺序，实现 O(n) 复杂度。挑战在于质量能否持平 softmax attention。</li>
