    <p><strong>SFT</strong> 是在预训练（Pre-training）的 Base Model 基础上，用<strong>高质量的人工标注数据</strong>（指令-回答对）进行监督学习，让模型学会遵循指令、生成符合人类期望的回答。</p>
    <pre><code>LLM 训练全流程：

Pre-training             → SFT              → Reward Model    → PPO / DPO

Base Model              SFT Model           RM                Aligned Model

典型数据量：
Pre-training: 数万亿 Token（如 LLaMA 1T+）
SFT: 1万~100万条 高质量指令-回答对
RLHF: 10万~100万条 人类偏好比较对</code></pre>

    <p>SFT 和 Pre-training 都使用<strong>交叉熵损失（Cross-Entropy Loss）</strong>，即 Next Token Prediction：</p>
    <pre><code># 统一的 Next Token Prediction Loss
L = - Σ_t log P(y_t | x, y_1, ..., y_{t-1})

Pre-training: 对所有 token 计算 Loss
SFT: 只对 Response 部分的 token 计算 Loss（Mask 掉 Prompt）</code></pre>
    <p><strong>为什么 Mask 掉 Prompt 部分：</strong></p>
    <ul>
      <li>SFT 的目标是<strong>学会"给这个指令，应该这样回答"</strong>，而不是"学会预测指令文本"。</li>
      <li>如果对 Prompt 也计算 Loss，模型会浪费容量去学习重复/补全指令，而非学习指令-回答的映射。</li>
      <li>不 Mask 的情况下，Prompt 和 Response 的 Loss 混合会稀释关键的学习信号。</li>
    </ul>
    <pre><code># 实现：labels 中 Prompt 部分设为 -100（PyTorch CrossEntropy 忽略 -100）
tokens = ["<|user|>", "你好", "请", "介绍", "北京", "<|assistant|>", "北京", "是", "..."]
labels = [-100,      -100, -100, -100, -100, -100,             "北京", "是", "..."]
#         ↑ 全部忽略                                        ↑ 从这里开始计算 Loss</code></pre>
    </div>
  `

    <p><strong>灾难性遗忘</strong>：在微调过程中，模型为了适应新任务的数据分布，过度调整参数，导致在预训练阶段学到的通用知识和能力被覆盖或丢失。</p>
    <p><strong>缓解策略：</strong></p>
    <ol>
      <li><strong>PEFT（LoRA / Adapter）</strong>：冻结主干参数，只训练少量新增参数。最有效的防遗忘方法。</li>
      <li><strong>较小的学习率</strong>：通常 SFT LR ≈ 2e-5（预训练的 1/10 ~ 1/100），减少参数更新幅度。</li>
      <li><strong>Data Replay / Mixing</strong>：在微调数据中混入一定比例的预训练数据（如 5-10%），让模型"复习"原有知识。</li>
      <li><strong>Early Stopping</strong>：只训练 1-3 个 Epoch。SFT 通常不需要多 Epoch（容易过拟合）。</li>
      <li><strong>KL 正则化</strong>：加一个 KL(π_θ || π_pretrained) 惩罚项，防止新策略偏离预训练分布太远。</li>
      <li><strong>渐进式解冻（Gradual Unfreezing）</strong>：先解冻顶层，逐层向下解冻。</li>
    </ol>
    </div>
  `

          title: "LoRA（Low-Rank Adaptation）的核心原理是什么？为什么低秩分解能有效微调大模型？",
          tags: [{text:"高频必考",cls:"hot"}, {text:"核心算法",cls:"core"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>核心假设：</strong>模型适配过程中的权重更新 ΔW 是<strong>低秩的（Low-Rank）</strong>——即可以用两个小矩阵的乘积来近似。这个假设来自 Aghajanyan et al. (2020) 的 Intrinsic Dimensionality 研究。</p>
    <pre><code># LoRA 核心公式
h = W₀·x + ΔW·x
  = W₀·x + (B·A)·x        # ΔW = B·A 低秩分解

其中：
W₀ ∈ ℝ^(d×k)   — 原始权重（冻结，不训练）
A  ∈ ℝ^(r×k)   — 降维矩阵（随机高斯初始化）
B  ∈ ℝ^(d×r)   — 升维矩阵（零初始化，训练开始时 ΔW=0）
r  ≪ min(d,k)  — 秩（通常 r=8~64）

参数量对比：
原始：d × k
LoRA：r × (d + k)   ← 当 r 很小时，参数量大幅减少

例如：d=4096, k=4096, r=16
原始参数：16.7M
LoRA 参数：131K   ← 减少了 99.2%</code></pre>
    <p><strong>为什么有效：</strong></p>
    <ul>
      <li>Aghajanyan 等人发现，大模型适应新任务时，参数更新的"内在维度"（intrinsic dimension）远小于参数空间维度。微调实际上只改变了少数"方向"。</li>
      <li>LoRA 通过低秩分解显式地约束更新在这些低维子空间中进行。</li>
    </ul>
    </div>
  `

    <pre><code># LoRA 实际更新的公式
ΔW = (α / r) · B·A
#     ↑ scaling factor

其中：
r — 秩（Rank）：控制 LoRA 的表达能力
α — 缩放因子：控制 LoRA 更新的"强度"（类似学习率的角色）</code></pre>
    <table>
      <tr><th>超参数</th><th>作用</th><th>太小</th><th>太大</th><th>常用值</th></tr>
      <tr><td>r</td><td>低秩分解的秩 — 决定能捕获多少"变化维度"</td><td>欠拟合，学不到足够知识</td><td>过拟合 + 增加计算量</td><td>8, 16, 32, 64</td></tr>
      <tr><td>α</td><td>缩放因子 — 放大/缩小 LoRA 更新的影响</td><td>学得太慢</td><td>训练不稳定</td><td>通常 α = 2r（如 r=16, α=32）</td></tr>
    </table>
    <p><strong>选参指导：</strong></p>
    <ul>
      <li><strong>简单任务</strong>（单轮 QA、分类）：r=8, α=16</li>
      <li><strong>中等复杂度</strong>（多轮对话、指令遵循）：r=16, α=32</li>
      <li><strong>复杂任务</strong>（代码生成、长文推理）：r=32~64, α=64~128</li>
      <li><strong>经验法则</strong>：α 设为 r 的 2 倍是一个好的起点</li>
      <li>α 增大 ≠ 学习率增大。实际有效学习率 ≈ lr × (α/r)</li>
    </ul>
    </div>
  `

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>最常见的加 LoRA 的位置：</strong></p>
    <pre><code>Transformer 层中可加 LoRA 的权重矩阵：

Multi-Head Attention:
  W_Q (Query)   ← ✅ 最常见
  W_K (Key)     ← ✅ 常见
  W_V (Value)   ← ✅ 最常见
  W_O (Output)  ← ✅ 常见

Feed Forward Network:
  W_up, W_gate, W_down  ← 可选，部分工作也加在这里</code></pre>
    <p><strong>为什么侧重 Attention 权重：</strong></p>
    <ul>
      <li>Attention 权重是"信息路由"的关键——微调主要是改变模型"关注什么"和"如何组合信息"。</li>
      <li>原论文实验表明，只对 W_Q 和 W_V 加 LoRA 就能达到接近 Full FT 的效果。</li>
      <li>对 Attention 的 4 个权重矩阵全加（Q、K、V、O）通常效果最好。</li>
      <li>对 FFN 也加可以进一步提升，但会增加参数量和可能过拟合。</li>
    </ul>
    <p><strong>现代实践：</strong>大多数开源微调项目（如 LLaMA-Factory）默认对 Attention 的 Q、K、V、O 全部加 LoRA，即 <code>target_modules=["q_proj","k_proj","v_proj","o_proj"]</code>。</p>
    </div>
  `

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>QLoRA</strong> 在 LoRA 的基础上，通过<strong>量化主干模型（Base Model）</strong>进一步压缩显存：</p>
    <pre><code>显存占用对比（以 LLaMA-7B 为例）：

Full Fine-Tuning:  ~ 56 GB  (FP16 模型 + 梯度 + 优化器状态)
LoRA:              ~ 16 GB  (FP16 模型 + LoRA 梯度)
QLoRA:             ~ 10 GB  (NF4 量化模型 + LoRA 梯度)
                                           ↑ 单张消费级 GPU 即可</code></pre>
    <p><strong>QLoRA 的三大技术：</strong></p>
    <ol>
      <li>
        <strong>NF4（4-bit NormalFloat）</strong>
        <p>一种针对正态分布权重优化的 4-bit 量化格式。假设预训练权重服从 N(0,σ)，NF4 在正态分布的尾部分配更多精度。比 INT4 更贴合神经网络权重的分布特点。</p>
      </li>
      <li>
        <strong>双重量化（Double Quantization）</strong>
        <p>对量化过程中的缩放因子（scaling factor）再做一次量化（从 FP32 → FP8）。进一步节省 ~0.4 bits/参数。</p>
      </li>
      <li>
        <strong>分页优化器（Paged Optimizer）</strong>
        <p>当显存不足时，将优化器状态换页到 CPU 内存（类似操作系统换页）。防止 OOM 而不影响训练正确性。</p>
      </li>
    </ol>
    <p>QLoRA 让在<strong>单张 24GB 消费级 GPU（RTX 3090/4090）上微调 33B 甚至 65B 模型</strong>成为可能。</p>
    </div>
  `

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <pre><code># LoRA Merge 公式
W_merged = W₀ + (α/r) · B·A

# 矩阵加法，将低秩适配器"融入"原始权重
# 合并后与普通模型完全一样，可以正常加载和推理</code></pre>
    <p><strong>应该 Merge 的场景：</strong></p>
    <ul>
      <li><strong>生产部署</strong>：合并后不需要额外的 LoRA 加载逻辑，减少推理延迟。</li>
      <li><strong>需要做量化部署</strong>：如 GPTQ / AWQ 量化通常需要完整的权重矩阵。</li>
      <li><strong>模型共享/分发</strong>：合并后的模型更易用（用户不需要知道 LoRA）。</li>
      <li><strong>多 LoRA 叠加</strong>：将多个 LoRA 逐个 merge 进同一个基底，实现能力组合。</li>
    </ul>
    <p><strong>不应该 Merge 的场景：</strong></p>
    <ul>
      <li><strong>需要服务多任务</strong>：保留基底 + 动态加载不同 LoRA 适配器，节省存储和显存。</li>
      <li><strong>快速实验/迭代</strong>：LoRA 小文件（几 MB），可以快速切换和对比不同版本。</li>
      <li><strong>隐私/安全隔离</strong>：不同用户使用不同的 LoRA，逻辑上隔离。</li>
    </ul>
    </div>
  `

          title: "Adapter 和 LoRA 在架构上有什么本质区别？各有什么优劣？",

          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <pre><code># Adapter 架构
x → [Self-Attention] → Add&Norm → [Adapter Layer] → Add&Norm → FFN → ...

Adapter Layer = W_up(ReLU(W_down(x))) + x
#  W_down: d → bottleneck → W_up: bottleneck → d
#  ↑ 串行插入，增加推理延迟

# LoRA 架构
x → [Self-Attention + LoRA] → Add&Norm → FFN → ...
#  ΔW = B·A 直接加到 W 上
#  ↑ 并行计算（可 Merge），不增加推理延迟</code></pre>
    <table>
      <tr><th>维度</th><th>Adapter</th><th>LoRA</th></tr>
      <tr><td>位置</td><td>串行插入在 Attention/FFN 之后</td><td>并行加到 Attention/FFN 的权重上</td></tr>
      <tr><td>推理开销</td><td>有（多了层，必须串行计算）</td><td>无（Merge 后等价于原始模型）</td></tr>
      <tr><td>表达能力</td><td>非线性（有 ReLU）</td><td>线性（纯矩阵乘法）</td></tr>
      <tr><td>参数量</td><td>较多（通常 3-8%）</td><td>较少（1-2%）</td></tr>
      <tr><td>多任务</td><td>需要切换 Adapter 层</td><td>可动态热加载 LoRA 权重</td></tr>
    </table>
    </div>
  `

          title: "什么是 Prefix Tuning 和 Prompt Tuning？它们与 LoRA 有什么本质不同？",
          tags: [{text:"方法理解",cls:"core"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p>Prefix Tuning 和 Prompt Tuning 的核心思想：<strong>不修改模型权重，而是在输入空间中学习"软提示"</strong>。</p>
    <pre><code># Prompt Tuning (Lester et al., 2021)
Input = [Soft_Prompt_1, ..., Soft_Prompt_k,  User_Input]
#        ↑ 可训练的虚拟 Embedding（k 个 token）
# 只在 Embedding 层加可训练参数，最简单但能力有限

# Prefix Tuning (Li & Liang, 2021)
# 在每一层都插入可训练的 Prefix 向量
for layer in transformer_layers:
    layer.attention.K = concat([Prefix_K, K])
    layer.attention.V = concat([Prefix_V, V])
# 每层都有 Prefix，表达能力更强</code></pre>
    <p><strong>与 LoRA 的本质区别：</strong></p>
    <ul>
      <li>LoRA 修改的是<strong>权重空间</strong>（改变模型的计算方式）</li>
      <li>Prefix/Prompt Tuning 修改的是<strong>输入/激活空间</strong>（改变模型的输入表示）</li>
      <li>Prompt Tuning 的参数量是最少的（仅 Embedding 层）但效果也最弱</li>
    </ul>
    </div>
  `

          title: "什么是 Gradient Checkpointing 和 Gradient Accumulation？各解决什么问题？",
          tags: [{text:"显存优化",cls:"hot"}],
          body: `    <div class="answer-section"><div class="answer-label">核心回答</div>
    <p><strong>Gradient Checkpointing（梯度检查点）</strong></p>
    <ul>
      <li><strong>问题：</strong>反向传播需要保存前向传播的中间激活值，显存消耗巨大。</li>
      <li><strong>方案：</strong>只保存部分层的激活值（检查点），反向传播时重新计算中间激活。用<strong>时间换空间</strong>。</li>
      <li><strong>代价：</strong>训练速度降低约 20-30%。</li>
    </ul>
    <p><strong>Gradient Accumulation（梯度累积）</strong></p>
    <ul>
      <li><strong>问题：</strong>GPU 显存不够 → 无法用足够大的 Batch Size → 训练不稳定。</li>
      <li><strong>方案：</strong>将一个大 Batch 拆分为多个 Micro-Batch，每个 Micro-Batch 前向+反向（但不更新），累积 N 个 Micro-Batch 的梯度后再做一次参数更新。</li>
      <li><strong>代价：</strong>无（训练速度略降因为更多通信）。</li>
    </ul>
    <pre><code># 示例：想用 global_batch_size=128 但单卡只能跑 4
per_device_batch = 4
gradient_accumulation_steps = 8
# 8 张卡 × 4 × 8 = 256 effective batch size

# 实现等价于：
for i, batch in enumerate(dataloader):
    loss = model(batch) / gradient_accumulation_steps
    loss.backward()  # 梯度累积
    if (i+1) % gradient_accumulation_steps == 0:
        optimizer.step()
        optimizer.zero_grad()</code></pre>
    </div>
  `
