<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Hot 100</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
  :root {
    --bg: #FAF9F5;
    --card: #FFFFFF;
    --border: #E8E5DC;
    --hairline: #EEEBE3;
    --text: #1F1E1D;
    --sub: #8A887F;
    --accent: #D97757;
    --accent-soft: #F6EDE7;
    --accent-hover: #C5613F;
    --code-bg: #262624;
    --code-text: #EDECE4;
    --easy: #2E9E52; --easy-bg: #E8F5EC;
    --medium: #C77B12; --medium-bg: #FBF1E1;
    --hard: #D03B30; --hard-bg: #FBEAE8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
                 "Helvetica Neue", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 15px; line-height: 1.6;
  }

  /* ===== 顶部 Hero ===== */
  .hero { max-width: 1060px; margin: 0 auto; padding: 72px 24px 36px; text-align: center; }
  .hero h1 {
    font-family: ui-serif, "New York", Georgia, "Songti SC", "SimSun", serif;
    font-size: 44px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero .sub { margin-top: 14px; color: var(--sub); font-size: 16px; }
  .progress-wrap { max-width: 320px; margin: 28px auto 0; }
  .progress-bar { background: #ECE9E0; border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px;
    transition: width .4s cubic-bezier(.25,.1,.25,1); }
  .progress-text { margin-top: 10px; font-size: 13px; color: var(--sub); }

  /* ===== 吸顶工具栏（毛玻璃）===== */
  .toolbar-sticky {
    position: sticky; top: 0; z-index: 50;
    background: rgba(250, 249, 245, .82);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--hairline);
  }
  .toolbar { max-width: 1060px; margin: 0 auto; padding: 12px 24px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search {
    flex: 1; min-width: 220px; padding: 9px 18px;
    border: 1px solid var(--border); border-radius: 99px;
    background: var(--card); font-size: 14px; outline: none; color: var(--text);
    transition: border-color .2s, box-shadow .2s;
  }
  .search::placeholder { color: #B8B5AA; }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(217,119,87,.15); }
  .segmented { display: flex; background: #ECE9E0; border-radius: 99px; padding: 3px; gap: 2px; }
  .segmented button {
    border: none; background: transparent; padding: 6px 16px; border-radius: 99px;
    font-size: 13px; color: var(--sub); cursor: pointer; font-weight: 500;
    transition: all .2s; font-family: inherit;
  }
  .segmented button.active { background: var(--card); color: var(--text);
    box-shadow: 0 1px 3px rgba(0,0,0,.08); }

  /* ===== 主体布局 ===== */
  .container { max-width: 1060px; margin: 28px auto 80px; padding: 0 24px;
    display: grid; grid-template-columns: 190px 1fr; gap: 32px; }
  aside { position: sticky; top: 70px; align-self: start; }
  .cat-title { font-size: 12px; font-weight: 600; color: var(--sub);
    text-transform: uppercase; letter-spacing: .06em; margin: 0 0 10px 14px; }
  .cat-btn {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; padding: 7px 14px; border: none; background: transparent;
    color: var(--text); font-size: 14px; border-radius: 10px; cursor: pointer;
    margin-bottom: 1px; transition: background .15s; font-family: inherit;
  }
  .cat-btn span.count { color: #B8B5AA; font-size: 12px; }
  .cat-btn:hover { background: #F0EEE6; }
  .cat-btn.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .cat-btn.active span.count { color: var(--accent); opacity: .7; }

  /* ===== 题目卡片 ===== */
  .problem {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    margin-bottom: 10px; overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .problem:hover { border-color: #DCD8CC; box-shadow: 0 2px 12px rgba(31,30,29,.05); }
  .problem.open { border-color: #DCD8CC; box-shadow: 0 4px 24px rgba(31,30,29,.07); }
  .problem-head { display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; cursor: pointer; user-select: none; }
  .problem-head input[type=checkbox] {
    width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
  }
  .pid { color: #B8B5AA; font-size: 13px; min-width: 40px; font-variant-numeric: tabular-nums; }
  .ptitle { flex: 1; font-size: 15px; font-weight: 590; letter-spacing: -0.01em; }
  .done .ptitle { color: #B8B5AA; font-weight: 400; }
  .badge { font-size: 12px; font-weight: 600; padding: 3px 10px;
    border-radius: 99px; white-space: nowrap; }
  .badge.easy { color: var(--easy); background: var(--easy-bg); }
  .badge.medium { color: var(--medium); background: var(--medium-bg); }
  .badge.hard { color: var(--hard); background: var(--hard-bg); }
  .tag { font-size: 12px; color: var(--sub); background: #F0EEE6;
    padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
  .chevron { color: #C9C6BB; font-size: 13px; transition: transform .25s; }
  .problem.open .chevron { transform: rotate(90deg); }

  .detail { display: none; border-top: 1px solid var(--hairline); padding: 20px; }
  .problem.open .detail { display: block; }
  .detail h4 { font-size: 13px; font-weight: 600; color: var(--sub);
    text-transform: uppercase; letter-spacing: .05em; margin: 18px 0 8px; }
  .detail h4:first-child { margin-top: 0; }
  .detail p { font-size: 14.5px; color: #3D3C38; line-height: 1.75; }
  .lc-link { font-size: 13.5px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .lc-link:hover { text-decoration: underline; }

  /* ===== 代码区 ===== */
  .code-editor {
    width: 100%; background: var(--code-bg); color: var(--code-text);
    padding: 16px 18px; border-radius: 12px; border: 1px solid transparent;
    font-size: 13px; line-height: 1.65;
    font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    resize: vertical; outline: none; tab-size: 4;
    transition: box-shadow .2s;
  }
  .code-editor:focus { box-shadow: 0 0 0 3px rgba(217,119,87,.25); }
  .run-bar { display: flex; gap: 10px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 8px 20px; border: none; border-radius: 99px; cursor: pointer;
    font-size: 13.5px; font-weight: 600; transition: all .2s; font-family: inherit;
  }
  .btn-run { background: var(--accent); color: #fff; }
  .btn-run:hover { background: var(--accent-hover); }
  .btn-run:active { transform: scale(.97); }
  .btn-reset { background: #F0EEE6; color: var(--sub); }
  .btn-reset:hover { background: #E8E5DC; color: var(--text); }
  .test-label { font-size: 12px; color: #B8B5AA;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; }

  /* ===== 运行结果面板 ===== */
  .output {
    margin-top: 12px; background: var(--code-bg); border-radius: 12px;
    display: none; overflow: hidden;
    animation: outIn .28s cubic-bezier(.25,.1,.25,1);
  }
  @keyframes outIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: none; }
  }
  .out-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; font-size: 12.5px; font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .out-head .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .out-head.ok  { color: #7CCB95; }
  .out-head.ok .dot  { background: #34C759; box-shadow: 0 0 8px rgba(52,199,89,.55); }
  .out-head.err { color: #FF8A7A; }
  .out-head.err .dot { background: #FF453A; box-shadow: 0 0 8px rgba(255,69,58,.55); }
  .time-pill {
    margin-left: auto; font-weight: 500; font-size: 11.5px; color: #A8A69E;
    background: rgba(255,255,255,.07); padding: 2px 10px; border-radius: 99px;
    font-variant-numeric: tabular-nums;
  }
  .out-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px; }
  .out-label {
    font-size: 10.5px; font-weight: 600; color: #7A786F;
    text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px;
  }
  .out-code {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 12.5px; line-height: 1.7; color: #A8A69E;
    white-space: pre-wrap; word-break: break-all;
  }
  .out-result {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px; line-height: 1.7; color: #EDECE4;
    background: rgba(255,255,255,.05); border-left: 3px solid #34C759;
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    white-space: pre-wrap; word-break: break-all;
  }
  .out-result.err-text { border-left-color: #FF453A; color: #FFB4A8; }
  .out-loading {
    display: flex; align-items: center; gap: 10px;
    padding: 16px; font-size: 13px; color: #A8A69E;
  }
  .spinner {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,.15); border-top-color: var(--accent);
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { color: var(--sub); text-align: center; padding: 60px 0; }

  @media (max-width: 720px) {
    .hero { padding: 48px 20px 28px; }
    .hero h1 { font-size: 32px; }
    .container { grid-template-columns: 1fr; gap: 16px; }
    .cat-title { display: none; }
    aside { position: static; display: flex; overflow-x: auto; gap: 4px; padding-bottom: 4px; }
    .cat-btn { white-space: nowrap; width: auto; }
    .cat-btn span.count { display: none; }
  }
</style>

<script>
/* ===== Python 运行环境公共工具（运行时自动注入）===== */
const HELPERS_PY = `
class ListNode:
    def __init__(self, val=0, next=None):
        self.val = val; self.next = next

class TreeNode:
    def __init__(self, val=0, left=None, right=None):
        self.val = val; self.left = left; self.right = right

def arr_to_list(a):
    d = ListNode(); p = d
    for x in a:
        p.next = ListNode(x); p = p.next
    return d.next

def list_to_arr(h):
    r = []
    while h:
        r.append(h.val); h = h.next
    return r

def arr_to_tree(a):
    if not a or a[0] is None: return None
    root = TreeNode(a[0]); q = [root]; i = 1
    while q and i < len(a):
        n = q.pop(0)
        if a[i] is not None:
            n.left = TreeNode(a[i]); q.append(n.left)
        i += 1
        if i < len(a) and a[i] is not None:
            n.right = TreeNode(a[i]); q.append(n.right)
        i += 1
    return root

def tree_to_arr(r):
    if not r: return []
    res = []; q = [r]
    while q:
        n = q.pop(0)
        if n:
            res.append(n.val); q.append(n.left); q.append(n.right)
        else:
            res.append(None)
    while res and res[-1] is None: res.pop()
    return res

def find_node(r, v):
    if not r: return None
    if r.val == v: return r
    return find_node(r.left, v) or find_node(r.right, v)
`;

/* ============ Hot 100 完整数据（100 题）============ */
const PROBLEMS = [
/* ---------- 哈希 (3) ---------- */
{ id:1, t:"两数之和", c:"哈希", d:"easy", s:"two-sum",
desc:"给定整数数组 nums 和目标值 target，在数组中找出和为 target 的两个整数，返回它们的下标。每种输入只对应一个答案，同一元素不能重复使用。",
code:
`def twoSum(nums, target):
    seen = {}
    for i, x in enumerate(nums):
        if target - x in seen:
            return [seen[target - x], i]
        seen[x] = i`,
test:`twoSum([2,7,11,15], 9)` },

{ id:49, t:"字母异位词分组", c:"哈希", d:"medium", s:"group-anagrams",
desc:"给定字符串数组，将所有字母异位词（字母相同、排列不同的字符串）组合在一起，按任意顺序返回结果列表。",
code:
`def groupAnagrams(strs):
    groups = {}
    for s in strs:
        key = ''.join(sorted(s))
        groups.setdefault(key, []).append(s)
    return list(groups.values())`,
test:`groupAnagrams(["eat","tea","tan","ate","nat","bat"])` },

{ id:128, t:"最长连续序列", c:"哈希", d:"medium", s:"longest-consecutive-sequence",
desc:"给定未排序的整数数组，找出数字连续的最长序列的长度（不要求元素在原数组中位置连续）。要求时间复杂度为 O(n)。",
code:
`def longestConsecutive(nums):
    s, best = set(nums), 0
    for x in s:
        if x - 1 in s:
            continue
        cur = x
        while cur + 1 in s:
            cur += 1
        best = max(best, cur - x + 1)
    return best`,
test:`longestConsecutive([100,4,200,1,3,2])` },

/* ---------- 双指针 (4) ---------- */
{ id:283, t:"移动零", c:"双指针", d:"easy", s:"move-zeroes",
desc:"将数组中所有 0 移动到末尾，同时保持非零元素的相对顺序。必须原地操作，不能拷贝额外数组。",
code:
`def moveZeroes(nums):
    k = 0
    for i in range(len(nums)):
        if nums[i] != 0:
            nums[k], nums[i] = nums[i], nums[k]
            k += 1
    return nums`,
test:`moveZeroes([0,1,0,3,12])` },

{ id:11, t:"盛最多水的容器", c:"双指针", d:"medium", s:"container-with-most-water",
desc:"给定 n 个高度，选择两条垂线与 x 轴构成容器，求容器能容纳水的最大量。",
code:
`def maxArea(height):
    l, r, best = 0, len(height) - 1, 0
    while l < r:
        best = max(best, (r - l) * min(height[l], height[r]))
        if height[l] < height[r]:
            l += 1
        else:
            r -= 1
    return best`,
test:`maxArea([1,8,6,2,5,4,8,3,7])` },

{ id:15, t:"三数之和", c:"双指针", d:"medium", s:"3sum",
desc:"在整数数组中找出所有和为 0 且不重复的三元组，要求三个元素下标互不相同，答案中不能包含重复的三元组。",
code:
`def threeSum(nums):
    nums.sort()
    res = []
    for i in range(len(nums) - 2):
        if i and nums[i] == nums[i-1]:
            continue
        l, r = i + 1, len(nums) - 1
        while l < r:
            s = nums[i] + nums[l] + nums[r]
            if s < 0: l += 1
            elif s > 0: r -= 1
            else:
                res.append([nums[i], nums[l], nums[r]])
                while l < r and nums[l] == nums[l+1]: l += 1
                while l < r and nums[r] == nums[r-1]: r -= 1
                l += 1; r -= 1
    return res`,
test:`threeSum([-1,0,1,2,-1,-4])` },

{ id:42, t:"接雨水", c:"双指针", d:"hard", s:"trapping-rain-water",
desc:"给定 n 个非负整数表示每个宽度为 1 的柱子的高度图，计算按此排列的柱子下雨之后能接多少雨水。",
code:
`def trap(height):
    l, r = 0, len(height) - 1
    lmax = rmax = res = 0
    while l < r:
        lmax = max(lmax, height[l])
        rmax = max(rmax, height[r])
        if lmax < rmax:
            res += lmax - height[l]; l += 1
        else:
            res += rmax - height[r]; r -= 1
    return res`,
test:`trap([0,1,0,2,1,0,1,3,2,1,2,1])` },

/* ---------- 滑动窗口 (2) ---------- */
{ id:3, t:"无重复字符的最长子串", c:"滑动窗口", d:"medium", s:"longest-substring-without-repeating-characters",
desc:"给定一个字符串，找出其中不含有重复字符的最长子串的长度。",
code:
`def lengthOfLongestSubstring(s):
    win, l, best = set(), 0, 0
    for r, c in enumerate(s):
        while c in win:
            win.remove(s[l]); l += 1
        win.add(c)
        best = max(best, r - l + 1)
    return best`,
test:`lengthOfLongestSubstring("abcabcbb")` },

{ id:438, t:"找到字符串中所有字母异位词", c:"滑动窗口", d:"medium", s:"find-all-anagrams-in-a-string",
desc:"给定字符串 s 和 p，找到 s 中所有 p 的字母异位词的子串，返回这些子串的起始索引。",
code:
`from collections import Counter

def findAnagrams(s, p):
    if len(s) < len(p):
        return []
    need, win = Counter(p), Counter(s[:len(p)])
    res = [0] if win == need else []
    for i in range(len(p), len(s)):
        win[s[i]] += 1
        win[s[i - len(p)]] -= 1
        if win[s[i - len(p)]] == 0:
            del win[s[i - len(p)]]
        if win == need:
            res.append(i - len(p) + 1)
    return res`,
test:`findAnagrams("cbaebabacd", "abc")` },

/* ---------- 子串 (3) ---------- */
{ id:560, t:"和为 K 的子数组", c:"子串", d:"medium", s:"subarray-sum-equals-k",
desc:"给定整数数组 nums 和整数 k，统计并返回该数组中和为 k 的连续子数组的个数。",
code:
`def subarraySum(nums, k):
    m = {0: 1}
    s = cnt = 0
    for x in nums:
        s += x
        cnt += m.get(s - k, 0)
        m[s] = m.get(s, 0) + 1
    return cnt`,
test:`subarraySum([1,1,1], 2)` },

{ id:239, t:"滑动窗口最大值", c:"子串", d:"hard", s:"sliding-window-maximum",
desc:"大小为 k 的滑动窗口从数组最左侧移动到最右侧，每次只向右移动一位，返回每个窗口中的最大值组成的数组。",
code:
`from collections import deque

def maxSlidingWindow(nums, k):
    dq, res = deque(), []
    for i, x in enumerate(nums):
        while dq and nums[dq[-1]] <= x:
            dq.pop()
        dq.append(i)
        if dq[0] <= i - k:
            dq.popleft()
        if i >= k - 1:
            res.append(nums[dq[0]])
    return res`,
test:`maxSlidingWindow([1,3,-1,-3,5,3,6,7], 3)` },

{ id:76, t:"最小覆盖子串", c:"子串", d:"hard", s:"minimum-window-substring",
desc:"给定字符串 s 和 t，返回 s 中涵盖 t 所有字符（含重复次数）的最小子串；若不存在则返回空字符串。",
code:
`from collections import Counter

def minWindow(s, t):
    need = Counter(t)
    missing = len(t)
    l = start = 0
    best = float('inf')
    for r, c in enumerate(s):
        if need[c] > 0:
            missing -= 1
        need[c] -= 1
        while missing == 0:
            if r - l + 1 < best:
                best = r - l + 1; start = l
            need[s[l]] += 1
            if need[s[l]] > 0:
                missing += 1
            l += 1
    return '' if best == float('inf') else s[start:start+best]`,
test:`minWindow("ADOBECODEBANC", "ABC")` },

/* ---------- 普通数组 (5) ---------- */
{ id:53, t:"最大子数组和", c:"普通数组", d:"medium", s:"maximum-subarray",
desc:"找出整数数组中具有最大和的连续子数组（至少包含一个元素），返回其最大和。",
code:
`def maxSubArray(nums):
    cur = best = nums[0]
    for x in nums[1:]:
        cur = max(x, cur + x)

{ id:189, t:"轮转数组", c:"普通数组", d:"medium", s:"rotate-array",
desc:"将数组中的元素整体向右轮转 k 个位置（k 非负）。尝试用 O(1) 额外空间的原地算法解决。",
code:
`def rotate(nums, k):
    n = len(nums)
    k %= n
    def rev(l, r):
        while l < r:
            nums[l], nums[r] = nums[r], nums[l]
            l += 1; r -= 1
    rev(0, n - 1); rev(0, k - 1); rev(k, n - 1)
    return nums`,
test:`rotate([1,2,3,4,5,6,7], 3)` },

{ id:238, t:"除自身以外数组的乘积", c:"普通数组", d:"medium", s:"product-of-array-except-self",
desc:"返回数组 answer，其中 answer[i] 等于 nums 中除 nums[i] 之外其余各元素的乘积。不能使用除法，且要求 O(n) 时间完成。",
code:
`def productExceptSelf(nums):
    n = len(nums)
    res = [1] * n
    for i in range(1, n):
        res[i] = res[i-1] * nums[i-1]
    suf = 1
    for i in range(n - 1, -1, -1):
        res[i] *= suf
        suf *= nums[i]
    return res`,
test:`productExceptSelf([1,2,3,4])` },

{ id:41, t:"缺失的第一个正数", c:"普通数组", d:"hard", s:"first-missing-positive",
desc:"给定未排序的整数数组，找出其中没有出现的最小的正整数。要求时间 O(n)、只用常数级别额外空间。",
code:
`def firstMissingPositive(nums):
    n = len(nums)
    for i in range(n):
        while 0 < nums[i] <= n and nums[nums[i]-1] != nums[i]:
            j = nums[i] - 1
            nums[i], nums[j] = nums[j], nums[i]
    for i in range(n):
        if nums[i] != i + 1:
            return i + 1
    return n + 1`,

{ id:54, t:"螺旋矩阵", c:"矩阵", d:"medium", s:"spiral-matrix",
desc:"给定 m×n 矩阵，按照顺时针螺旋顺序返回矩阵中的所有元素。",
code:
`def spiralOrder(matrix):
    res = []
    top, bottom = 0, len(matrix) - 1
    left, right = 0, len(matrix[0]) - 1
    while top <= bottom and left <= right:
        for j in range(left, right + 1): res.append(matrix[top][j])
        top += 1
        for i in range(top, bottom + 1): res.append(matrix[i][right])
        right -= 1
        if top <= bottom:
            for j in range(right, left - 1, -1): res.append(matrix[bottom][j])
            bottom -= 1
        if left <= right:
            for i in range(bottom, top - 1, -1): res.append(matrix[i][left])
            left += 1
    return res`,
test:`spiralOrder([[1,2,3],[4,5,6],[7,8,9]])` },

{ id:148, t:"排序链表", c:"链表", d:"medium", s:"sort-list",

`def sortList(head):

        return head
    slow, fast = head, head.next
    while fast and fast.next:
        slow, fast = slow.next, fast.next.next
    mid, slow.next = slow.next, None
    def merge(a, b):
        d = ListNode(); p = d
        while a and b:

{ id:146, t:"LRU 缓存", c:"链表", d:"medium", s:"lru-cache",
desc:"设计并实现满足 LRU（最近最少使用）约束的缓存数据结构，get 和 put 操作均需达到 O(1) 平均时间复杂度。",
code:
`from collections import OrderedDict

class LRUCache:
    def __init__(self, capacity):
        self.cap = capacity
        self.od = OrderedDict()
    def get(self, key):
        if key not in self.od:
            return -1
        self.od.move_to_end(key)
        return self.od[key]
    def put(self, key, value):
        self.od[key] = value
        self.od.move_to_end(key)
        if len(self.od) > self.cap:
            self.od.popitem(last=False)`,
test:`c = LRUCache(2); out = []

c.put(3,3)
out.append(c.get(2))
c.put(4,4)

out` },

{ id:543, t:"二叉树的直径", c:"二叉树", d:"easy", s:"diameter-of-binary-tree",

`def diameterOfBinaryTree(root):

        if not n:

        return max(l, r) + 1
    depth(root)

{ id:230, t:"二叉搜索树中第 K 小的元素", c:"二叉树", d:"medium", s:"kth-smallest-element-in-a-bst",

`def kthSmallest(root, k):

        root = root.right`,

`def flatten(root):

`def buildTree(preorder, inorder):
    idx = {v: i for i, v in enumerate(inorder)}
    def build(pl, pr, il, ir):

        i = idx[preorder[pl]]

{ id:437, t:"路径总和 III", c:"二叉树", d:"medium", s:"path-sum-iii",

code:
`from collections import defaultdict

def pathSum(root, targetSum):
    cnt = defaultdict(int)
    cnt[0] = 1
    res = 0
    def dfs(node, s):
        nonlocal res
        if not node:
            return
        s += node.val
        res += cnt[s - targetSum]
        cnt[s] += 1
        dfs(node.left, s); dfs(node.right, s)
        cnt[s] -= 1
    dfs(root, 0)
    return res`,

`def maxPathSum(root):

    def gain(n):

`def orangesRotting(grid):
    m, n = len(grid), len(grid[0])

code:
`from collections import deque

def canFinish(numCourses, prerequisites):
    g = [[] for _ in range(numCourses)]
    indeg = [0] * numCourses
    for a, b in prerequisites:
        g[b].append(a)
        indeg[a] += 1
    q = deque(i for i in range(numCourses) if indeg[i] == 0)
    seen = 0
    while q:
        u = q.popleft()
        seen += 1
        for v in g[u]:
            indeg[v] -= 1
            if indeg[v] == 0:
                q.append(v)
    return seen == numCourses`,

code:
`class Trie:
    def __init__(self):
        self.root = {}
    def insert(self, word):
        node = self.root
        for c in word:
            node = node.setdefault(c, {})
        node['#'] = True
    def _find(self, s):
        node = self.root
        for c in s:
            if c not in node:
                return None
            node = node[c]
        return node
    def search(self, word):
        n = self._find(word)
        return bool(n) and '#' in n
    def startsWith(self, prefix):
        return self._find(prefix) is not None`,

`def exist(board, word):
    m, n = len(board), len(board[0])
    def dfs(i, j, k):
        if not (0 <= i < m and 0 <= j < n) or board[i][j] != word[k]:
            return False
        if k == len(word) - 1:
            return True
        board[i][j] = '#'
        found = (dfs(i+1,j,k+1) or dfs(i-1,j,k+1)
                 or dfs(i,j+1,k+1) or dfs(i,j-1,k+1))

        return found
    return any(dfs(i, j, 0) for i in range(m) for j in range(n))`,

{ id:51, t:"N 皇后", c:"回溯", d:"hard", s:"n-queens",
desc:"将 n 个皇后放置在 n×n 棋盘上使其互不攻击（不同行、列、对角线），返回所有不同的摆放方案。",
code:
`def solveNQueens(n):
    res, pos = [], []
    cols, d1, d2 = set(), set(), set()
    def bt(row):
        if row == n:
            res.append(['.' * c + 'Q' + '.' * (n-c-1) for c in pos])
            return
        for c in range(n):
            if c in cols or row - c in d1 or row + c in d2:
                continue
            cols.add(c); d1.add(row - c); d2.add(row + c); pos.append(c)
            bt(row + 1)
            cols.discard(c); d1.discard(row - c); d2.discard(row + c); pos.pop()
    bt(0)
    return res`,

{ id:4, t:"寻找两个正序数组的中位数", c:"二分查找", d:"hard", s:"median-of-two-sorted-arrays",

code:
`def findMedianSortedArrays(A, B):
    if len(A) > len(B):
        A, B = B, A
    m, n = len(A), len(B)
    half = (m + n + 1) // 2
    lo, hi = 0, m
    while lo <= hi:
        i = (lo + hi) // 2
        j = half - i
        aL = A[i-1] if i else float('-inf')
        aR = A[i] if i < m else float('inf')
        bL = B[j-1] if j else float('-inf')
        bR = B[j] if j < n else float('inf')
        if aL <= bR and bL <= aR:
            if (m + n) % 2:
                return max(aL, bL)
            return (max(aL, bL) + min(aR, bR)) / 2
        if aL > bR:
            hi = i - 1
        else:
            lo = i + 1`,
test:`[findMedianSortedArrays([1,3],[2]), findMedianSortedArrays([1,2],[3,4])]` },

def topKFrequent(nums, k):
    cnt = Counter(nums)
    buckets = [[] for _ in range(len(nums) + 1)]

code:
`import heapq

class MedianFinder:
    def __init__(self):
        self.small = []  # 大顶堆（取负）
        self.large = []  # 小顶堆
    def addNum(self, num):
        heapq.heappush(self.small, -num)
        heapq.heappush(self.large, -heapq.heappop(self.small))
        if len(self.large) > len(self.small):
            heapq.heappush(self.small, -heapq.heappop(self.large))
    def findMedian(self):
        if len(self.small) > len(self.large):
            return -self.small[0]
        return (-self.small[0] + self.large[0]) / 2`,

`def numSquares(n):
    dp = [0] + [float('inf')] * n
    for i in range(1, n + 1):

`def coinChange(coins, amount):

{ id:64, t:"最小路径和", c:"多维动态规划", d:"medium", s:"minimum-path-sum",
desc:"给定含非负整数的 m×n 网格，找出从左上角到右下角使路径上数字总和最小的路径（每次只能向下或向右）。",
code:
`def minPathSum(grid):
    m, n = len(grid), len(grid[0])
    for i in range(m):
        for j in range(n):
            if i == 0 and j == 0:
                continue
            up = grid[i-1][j] if i else float('inf')
            left = grid[i][j-1] if j else float('inf')
            grid[i][j] += min(up, left)
    return grid[-1][-1]`,

{ id:5, t:"最长回文子串", c:"多维动态规划", d:"medium", s:"longest-palindromic-substring",
desc:"给定字符串 s，返回 s 中最长的回文子串。",
code:
`def longestPalindrome(s):
    best = ''
    def expand(l, r):
        nonlocal best
        while l >= 0 and r < len(s) and s[l] == s[r]:
            l -= 1; r += 1
        if r - l - 1 > len(best):
            best = s[l+1:r]
    for i in range(len(s)):
        expand(i, i)
        expand(i, i + 1)
    return best`,
test:`longestPalindrome("babad")` },

{ id:1143, t:"最长公共子序列", c:"多维动态规划", d:"medium", s:"longest-common-subsequence",
desc:"返回两个字符串的最长公共子序列的长度（子序列不要求连续但需保持相对顺序），不存在则返回 0。",
code:
`def longestCommonSubsequence(text1, text2):
    m, n = len(text1), len(text2)
    dp = [[0] * (n + 1) for _ in range(m + 1)]
    for i in range(1, m + 1):
        for j in range(1, n + 1):
            if text1[i-1] == text2[j-1]:
                dp[i][j] = dp[i-1][j-1] + 1
            else:
                dp[i][j] = max(dp[i-1][j], dp[i][j-1])
    return dp[m][n]`,
test:`longestCommonSubsequence("abcde", "ace")` },

{ id:72, t:"编辑距离", c:"多维动态规划", d:"medium", s:"edit-distance",

code:
`def minDistance(word1, word2):
    m, n = len(word1), len(word2)
    dp = [[0] * (n + 1) for _ in range(m + 1)]
    for i in range(m + 1):
        dp[i][0] = i
    for j in range(n + 1):
        dp[0][j] = j
    for i in range(1, m + 1):
        for j in range(1, n + 1):
            if word1[i-1] == word2[j-1]:
                dp[i][j] = dp[i-1][j-1]
            else:
                dp[i][j] = min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]) + 1
    return dp[m][n]`,

{ id:75, t:"颜色分类", c:"技巧", d:"medium", s:"sort-colors",
desc:"原地对含 0、1、2（红白蓝）的数组排序，使相同颜色相邻并按红白蓝排列，不能用库函数，最好一趟扫描完成。",
code:
`def sortColors(nums):
    p0, i, p2 = 0, 0, len(nums) - 1
    while i <= p2:
        if nums[i] == 0:
            nums[i], nums[p0] = nums[p0], nums[i]
            p0 += 1; i += 1
        elif nums[i] == 2:
            nums[i], nums[p2] = nums[p2], nums[i]
            p2 -= 1
        else:
            i += 1
    return nums`,
test:`sortColors([2,0,2,1,1,0])` },

{ id:31, t:"下一个排列", c:"技巧", d:"medium", s:"next-permutation",
desc:"将数组原地修改为字典序中下一个更大的排列；若已是最大排列，则重排为最小排列（升序），只允许常数额外空间。",
code:
`def nextPermutation(nums):
    i = len(nums) - 2
    while i >= 0 and nums[i] >= nums[i + 1]:
        i -= 1
    if i >= 0:
        j = len(nums) - 1
        while nums[j] <= nums[i]:
            j -= 1
        nums[i], nums[j] = nums[j], nums[i]
    nums[i+1:] = reversed(nums[i+1:])
    return nums`,
test:`nextPermutation([1,2,3])` },

{ id:287, t:"寻找重复数", c:"技巧", d:"medium", s:"find-the-duplicate-number",
desc:"长度 n+1 的数组中数字都在 [1, n] 内，只有一个重复整数（可能重复多次），在不修改数组且只用 O(1) 空间的前提下找出它。",
code:
`def findDuplicate(nums):
    slow, fast = nums[0], nums[nums[0]]
    while slow != fast:
        slow = nums[slow]
        fast = nums[nums[fast]]
    slow = 0
    while slow != fast:
        slow = nums[slow]
        fast = nums[fast]
    return slow`,
test:`findDuplicate([1,3,4,2,2])` },

/* ===== 渲染与运行逻辑 ===== */
const KEY = 'hot100-done';
let done = new Set(JSON.parse(localStorage.getItem(KEY) || '[]'));
let curCat = '全部', curDiff = 'all', keyword = '';
const cats = ['全部', ...new Set(PROBLEMS.map(p => p.c))];
const diffName = { easy: '简单', medium: '中等', hard: '困难' };
const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');

function renderCats() {
  document.getElementById('catList').innerHTML = cats.map(c =>
    '<button class="cat-btn ' + (c === curCat ? 'active' : '') + '" onclick="setCat(\'' + c + '\')">' +
    '<span>' + c + '</span><span class="count">' +
    (c === '全部' ? PROBLEMS.length : PROBLEMS.filter(p => p.c === c).length) +
    '</span></button>').join('');
}

function renderList() {
  const list = PROBLEMS.filter(p =>
    (curCat === '全部' || p.c === curCat) &&
    (curDiff === 'all' || p.d === curDiff) &&
    (p.t.includes(keyword) || String(p.id).includes(keyword)));
  document.getElementById('problemList').innerHTML = list.map(p => {
    const url = 'https://leetcode.cn/problems/' + p.s + '/';
    const rows = Math.min(p.code.split('\n').length + 1, 30);
    return '<div class="problem ' + (done.has(p.id) ? 'done' : '') + '" id="p' + p.id + '">' +
      '<div class="problem-head" onclick="toggle(' + p.id + ')">' +
        '<input type="checkbox" ' + (done.has(p.id) ? 'checked' : '') +
          ' onclick="event.stopPropagation();markDone(' + p.id + ')">' +
        '<span class="pid">' + p.id + '</span><span class="ptitle">' + p.t + '</span>' +
        '<span class="tag">' + p.c + '</span>' +
        '<span class="badge ' + p.d + '">' + diffName[p.d] + '</span>' +
        '<span class="chevron">›</span>' +
      '</div><div class="detail">' +
        '<h4>题目描述</h4><p>' + p.desc +
          ' <a class="lc-link" href="' + url + '" target="_blank">在力扣中打开 ↗</a></p>' +
        '<h4>Python 实现</h4>' +
        '<textarea class="code-editor" id="code' + p.id + '" rows="' + rows + '" spellcheck="false">' +
          esc(p.code) + '</textarea>' +
        '<div class="run-bar">' +
          '<button class="btn btn-run" onclick="runCode(' + p.id + ')">运行</button>' +
          '<button class="btn btn-reset" onclick="resetCode(' + p.id + ')">重置</button>' +
          '<span class="test-label">' + esc(p.test.replace(/\s+/g, ' ').slice(0, 55)) +
            (p.test.length > 55 ? '…' : '') + '</span>' +
        '</div>' +
        '<div class="output" id="out' + p.id + '"></div>' +
      '</div></div>';
  }).join('') || '<p class="empty">没有匹配的题目</p>';
  renderProgress();
}

function renderProgress() {
  const pct = Math.round(done.size / PROBLEMS.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    '已完成 ' + done.size + ' / ' + PROBLEMS.length + ' 题';
}

/* ---- Pyodide：懒加载，仅初始化一次 ---- */
let pyodidePromise = null;
function getPyodide() {
  if (!pyodidePromise) {
    pyodidePromise = loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/' });
  }
  return pyodidePromise;
}

window.runCode = async function(id) {
  const p = PROBLEMS.find(x => x.id === id);
  const out = document.getElementById('out' + id);
  out.style.display = 'block';
  out.innerHTML =
    '<div class="out-loading"><div class="spinner"></div>' +
    (pyodidePromise ? '正在运行…' : '首次运行，正在加载 Python 环境（约 10–20 秒）…') +
    '</div>';
  try {
    const py = await getPyodide();
    const program = HELPERS_PY + '\n' +
      document.getElementById('code' + id).value + '\n' + p.test;
    const ns = py.globals.get('dict')();
    try {
      const t0 = performance.now();
      const result = py.runPython(program, { globals: ns });
      const ms = (performance.now() - t0).toFixed(1);
      let text;
      if (result === undefined || result === null) text = 'None';
      else if (typeof result === 'boolean') text = result ? 'True' : 'False';
      else if (typeof result === 'object') {
        text = result.toString();
        if (result.destroy) result.destroy();
      } else text = String(result);
      out.innerHTML =
        '<div class="out-head ok"><span class="dot"></span>运行成功' +
          '<span class="time-pill">' + ms + ' ms</span></div>' +
        '<div class="out-body">' +
          '<div><div class="out-label">测试用例</div>' +
            '<div class="out-code">' + esc(p.test) + '</div></div>' +
          '<div><div class="out-label">输出</div>' +
            '<div class="out-result">' + esc(text) + '</div></div>' +
        '</div>';
    } finally {
      ns.destroy();
    }
  } catch (e) {
    out.innerHTML =
      '<div class="out-head err"><span class="dot"></span>运行出错</div>' +
      '<div class="out-body">' +
        '<div><div class="out-label">错误信息</div>' +
        '<div class="out-result err-text">' + esc(String(e.message)) + '</div></div>' +
      '</div>';
  }
};

window.resetCode = function(id) {
  const p = PROBLEMS.find(x => x.id === id);
  document.getElementById('code' + id).value = p.code;
  document.getElementById('out' + id).style.display = 'none';
};

window.setCat = c => { curCat = c; renderCats(); renderList(); };
window.toggle = id => document.getElementById('p' + id).classList.toggle('open');
window.markDone = id => {
  done.has(id) ? done.delete(id) : done.add(id);
  localStorage.setItem(KEY, JSON.stringify([...done]));
  renderList();
};
document.getElementById('searchBox').oninput = e => { keyword = e.target.value.trim(); renderList(); };
document.getElementById('diffSeg').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#diffSeg button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  curDiff = e.target.dataset.d;
  renderList();
});

renderCats(); renderList();
