          body: `      <div class="answer-section">

        <p><strong>AI Agent（智能体）</strong> 是一个能够<strong>自主感知环境、做出决策并采取行动</strong>来完成目标的系统。它与传统 LLM Chatbot 的本质区别在于：</p>

          <tr style="border-bottom:1px solid var(--border-light);"><td style="padding:6px 8px;">交互模式</td><td style="padding:6px 8px;">单轮/多轮对话</td><td style="padding:6px 8px;">自主循环 (Sense→Think→Act)</td></tr>

          <tr style="border-bottom:1px solid var(--border-light);"><td style="padding:6px 8px;">规划能力</td><td style="padding:6px 8px;">无显式规划</td><td style="padding:6px 8px;">任务分解、多步推理与执行</td></tr>

          title: "Agent 的自主循环（Agentic Loop）是如何工作的？请描述其核心流程。",

          body: `      <div class="answer-section">
        <div class="answer-label">核心回答</div>
        <p>Agentic Loop 是 Agent 运行的<strong>核心引擎</strong>，本质上是一个 <strong>while 循环</strong>，直到任务完成或达到最大步数限制：</p>
        <pre><code>while not task_complete and step &lt; max_steps:
    # 1. 感知 (Perceive)
    observation = get_observation(environment)

    # 2. 思考 (Think)
    thought = llm.think(task, observation, memory, tools)

    # 3. 决策 (Decide)
    action = parse_action(thought)  # 可能是调用工具 or 生成最终答案

    # 4. 行动 (Act)
    if action.is_tool_call:
        result = execute_tool(action.tool_name, action.params)
        memory.add(action, result)  # 存入记忆
    else:
        return action.final_answer  # 任务完成</code></pre>
      </div>

        <div class="answer-label">关键设计要点</div>
        <ul>
          <li><strong>终止条件</strong>：必须设置 max_steps 防止无限循环；LLM 也可主动发出 finish 信号。</li>
          <li><strong>上下文管理</strong>：每步的 observation 都追加到上下文，长任务可能超出窗口 — 需要摘要/压缩策略。</li>

        </ul>
      </div>
    `

        <p>LLM 在 Agent 架构中承担的是<strong>中央推理引擎</strong>的角色，负责：</p>
        <ul>

          <li><strong>反思纠错</strong>：识别自己的错误（如工具调用失败），调整策略重试。</li>
          <li><strong>最终合成</strong>：将多步执行结果整合为连贯的最终输出。</li>
        </ul>
        <p>LLM 不直接执行操作，而是<strong>生成"行动计划"</strong>，由 Agent 框架负责执行和反馈。</p>
      </div>
    `

        <div class="answer-label">核心回答</div>
        <p><strong>Function Calling</strong> 是 LLM API 层面的能力：模型被训练为在推理时输出结构化的函数调用指令（函数名 + JSON 参数），而不是自然语言文本。<strong>Tool Use</strong> 是 Agent 层面的概念：Agent 将外部能力（API、数据库、代码解释器等）封装为"工具"，利用 Function Calling 机制来驱动这些工具。</p>
        <p>关系：<strong>Function Calling 是实现 Tool Use 的技术手段</strong>。</p>
      </div>
      <div class="answer-section">
        <div class="answer-label">技术原理</div>
        <ol>
          <li><strong>工具定义</strong>：用 JSON Schema 描述每个工具的名称、描述、参数类型。</li>
          <li><strong>模型推理</strong>：将工具定义传入模型，模型在推理时输出 tool_calls（而非普通文本）。</li>
          <li><strong>执行</strong>：Agent 框架解析 tool_calls，调用对应的实际函数，获取结果。</li>
          <li><strong>反馈</strong>：将工具执行结果作为新的消息（role: "tool"）追加到对话中，模型继续推理。</li>
        </ol>
        <pre><code>// 工具定义示例
{
  "name": "search_web",
  "description": "搜索互联网获取最新信息",
  "parameters": {
    "type": "object",
    "properties": {
      "query": { "type": "string", "description": "搜索关键词" },
      "max_results": { "type": "integer", "default": 5 }
    },
    "required": ["query"]
  }
}</code></pre>
      </div>
    `

          <li><strong>延迟</strong>：Agent 需要多轮 LLM 调用，端到端延迟可能是单次推理的 5-20 倍。流式输出和并行化是关键优化方向。</li>

          <li><strong>安全与对齐</strong>：Agent 可以执行代码、访问外部系统，sandbox 隔离、权限控制、人工审核机制必不可少。</li>
          <li><strong>可观测性</strong>：需要全链路追踪（每一步的 thought/action/observation），便于调试和评估。</li>
          <li><strong>评估</strong>：Agent 任务的正确性难以自动判断，需要构建 benchmark + LLM-as-Judge + 人工评估的多层体系。</li>
        </ol>
      </div>
    `

        <p><strong>ReAct</strong>（Reasoning + Acting）由 Google DeepMind 在 2022 年提出，是一种让 LLM <strong>交替进行推理和行动</strong>的提示范式。核心思想是：让模型在每一步都输出 <strong>Thought（思考）→ Action（行动）→ Observation（观察）</strong> 三个部分。</p>

Thought: 现在我知道了得主，还需要搜索他们的主要贡献
Action: search("John Hopfield Geoffrey Hinton contributions")

          tags: [{text:"范式细节",cls:"core"}],
          body: `      <div class="answer-section">
        <div class="answer-label">核心回答</div>
        <p>三者的关系是<strong>串行循环</strong>的：<strong>Thought → Action → Observation → Thought → …</strong></p>
        <ul>
          <li><strong>Thought（思考）</strong>：分析当前状态和已获得的信息，决定接下来需要什么信息或做什么操作。这是<strong>推理层</strong>。</li>
          <li><strong>Action（行动）</strong>：将思考转化为具体操作——调用搜索、计算器、数据库查询等工具。这是<strong>执行层</strong>。</li>
          <li><strong>Observation（观察）</strong>：工具返回的结果，成为新的信息输入。这是<strong>反馈层</strong>。</li>
        </ul>
      </div>
      <div class="answer-section">
        <div class="answer-label">设计考量</div>
        <ul>
          <li><strong>Thought 质量</strong>：需要引导模型做出结构化的推理，而非泛泛的"我需要搜索"。</li>
          <li><strong>Action 格式</strong>：必须可以被可靠解析（如 JSON 格式），否则 Agent 框架无法执行。</li>
          <li><strong>Observation 长度</strong>：搜索结果可能很长，需要截断或摘要后再反馈给模型。</li>
          <li><strong>终止判断</strong>：模型需要学会在信息足够时直接给出 Final Answer，而非无限搜索。</li>
        </ul>
      </div>
    `

          id: "q8", num: "8",
          title: "ReAct 有哪些常见的变体和改进？请至少列举三种。",
          tags: [{text:"高频",cls:"hot"}],
          body: `      <div class="answer-section">
        <div class="answer-label">核心回答</div>
        <ol>
          <li>
            <strong>ReWOO（Reasoning WithOut Observation）</strong>
            <p>将规划和执行分离：先生成完整的工具调用计划（不等待结果），然后批量执行所有工具调用，最后基于所有结果一次性生成答案。优点：减少 LLM 调用次数，降低延迟。</p>
          </li>
          <li>
            <strong>Reflexion</strong>
            <p>在 ReAct 基础上增加<strong>自我反思</strong>机制：每轮执行后，Agent 进行口头反思（verbal reflection），将经验教训存入长期记忆，指导后续尝试。特别适合需要多次试错的任务（如代码生成）。</p>
          </li>
          <li>
            <strong>Plan-and-Solve（Plan → Execute）</strong>
            <p>先让 LLM 生成完整计划（列出所有步骤），然后按计划逐步执行，每一步执行后再检查计划是否需要调整。适合复杂多步推理任务。</p>
          </li>
          <li>
            <strong>Tree-of-Thought (ToT) + Tool Use</strong>
            <p>在每一步从多个可能的 Action 中选择最优的，构建搜索树，使用 BFS/DFS + 自我评估来探索多条路径。</p>
          </li>
        </ol>
      </div>
    `

          <li><strong>重试上限</strong>：设置每个步骤的最大重试次数（通常 3 次），避免死循环。</li>

Action: search("2024 Nobel Prize Physics")  # 修正后重试
Observation: ...</code></pre>
      </div>
    `

          <li><strong>明确的返回值格式</strong>：工具返回的结构化数据应该易于 LLM 理解。</li>
          <li><strong>错误处理约定</strong>：定义工具失败时的返回格式（如 <code>{"error": "..."}</code>），让 LLM 能识别并处理。</li>

          <li><strong>参数不过多</strong>：超过 5 个参数时考虑拆分为多个工具或使用可选参数+默认值。</li>

          <li><strong>Recursive Decomposition</strong>：对每个子任务继续递归分解，直到每个子任务都足够简单（可由一个工具完成）。</li>
          <li><strong>Template-based</strong>：对常见任务类型（如数据分析、信息检索）预设分解模板。</li>

        <ul>
          <li><strong>完备性</strong>：所有子任务完成后是否能达成原始目标。</li>
          <li><strong>独立性</strong>：子任务之间的耦合度是否足够低，能否并行执行。</li>

          <li><strong>AutoGPT</strong>：在 BabyAGI 基础上增加了更多组件——互联网搜索、文件读写、长期记忆（向量存储）。它的 Prompt 中包含了"你是 Entity X，你的目标是 Y"的角色设定。</li>

          <li><strong>写入（Write）</strong>：将关键信息（对话片段、学到的经验、用户事实）进行 embedding → 存入向量数据库（如 Pinecone、Chroma、Milvus）。</li>
          <li><strong>检索（Retrieve）</strong>：当前任务/查询进行 embedding → 在向量数据库中搜索最相似的 Top-K 记忆 → 注入到 LLM Prompt。</li>
          <li><strong>更新（Update）</strong>：基于新信息更新或删除过时记忆（如用户搬家后更新地址）。</li>
        </ol>
        <p><strong>关键设计选择：</strong></p>
        <ul>
          <li><strong>Embedding 模型</strong>：选通用文本（text-embedding-3）还是领域特化模型。</li>
          <li><strong>Chunk 策略</strong>：每段记忆的粒度——是整段对话、单个事实、还是按 Token 数切分。</li>
          <li><strong>记忆衰减</strong>：是否对旧记忆做衰减/归档（时间加权检索、TTL 过期）。</li>
          <li><strong>检索策略</strong>：纯向量检索 vs 混合检索（向量 + 关键词 BM25）。</li>
          <li><strong>记忆组织</strong>：是否按用户、按话题、按重要性分级存储。</li>
        </ul>
      </div>
    `

          <li>特别适合<strong>代码生成、决策任务</strong>等有明确对错的场景。</li>

        <ul>
          <li>不仅包括口头反思，还包括<strong>结构化经验提取</strong>——将成功的执行轨迹（trajectory）作为 few-shot 示例存储。</li>
          <li>可以涵盖<strong>参数调优经验</strong>（"用 temperature=0.3 效果更好"）、<strong>工具选择经验</strong>（"查询用户数据应该用 query_db 而非 search_web"）。</li>

        <p><strong>核心区别：</strong>Reflexion 侧重"从失败中学习"（事后反思），Experiential Learning 更广——也包括"从成功中学习"（最佳实践积累）。</p>

        <p><strong>相比单 Agent 的优势：</strong></p>
        <ol>
          <li><strong>分工协作（Division of Labor）</strong>：复杂任务分解后由不同专长的 Agent 处理——如一个 Agent 负责写代码，另一个负责测试。</li>
          <li><strong>容错与鲁棒性</strong>：单个 Agent 出错不会导致整个任务失败，其他 Agent 可以接管或修正。</li>
          <li><strong>并行处理</strong>：多个 Agent 可以同时处理不同的子任务，显著提高吞吐量。</li>
          <li><strong>多视角决策</strong>：通过多个 Agent 的讨论、辩论来减少偏见和幻觉（类似 ensemble）。</li>
          <li><strong>扩展性</strong>：需要新能力时，添加新的专项 Agent 而非修改单一的巨型 Agent。</li>
        </ol>
      </div>

        <ol>
          <li>
            <strong>多数投票（Majority Voting）</strong>
            <p>每个 Agent 独立给出判断，取票数最多的选项。简单高效，但不考虑 Agent 的专业度差异。</p>
          </li>
          <li>
            <strong>加权投票（Weighted Voting）</strong>
            <p>根据 Agent 的历史准确率、专业领域匹配度等赋予不同权重。例如：代码相关问题上，coder Agent 的投票权重更高。</p>
          </li>
          <li>
            <strong>辩论共识（Debate Consensus）</strong>
            <p>Agent 之间通过多轮辩论逐渐缩小分歧。一方提出论点 → 另一方反驳 → 第一方修正 → 直到达成一致或裁判裁定。</p>
          </li>
          <li>
            <strong>裁判/仲裁（Judge Arbitration）</strong>
            <p>引入一个中立的 Judge Agent，听取各方意见后做出最终裁定。</p>
          </li>
          <li>
            <strong>置信度加权（Confidence-Weighted）</strong>
            <p>每个 Agent 不仅给出答案，还给出置信度。最终结论以置信度加权聚合。</p>
          </li>
        </ol>
      </div>

        <div class="answer-label">核心回答</div>
        <ol>
          <li>
            <strong>成本爆炸</strong>
            <p>多 Agent 系统中每个 Agent 都在消耗 Token，总成本是单 Agent 的 N 倍。应对：只为必要任务启动多 Agent；用 Haiku/小模型做简单 Agent；设置 max_round 限制对话轮数。</p>
          </li>
          <li>
            <strong>协调开销（Coordination Overhead）</strong>
            <p>Agent 之间的通信本身消耗 Token 和时间——有时协调成本超过执行成本。应对：只在任务确实需要协作时才用多 Agent 模式。</p>
          </li>
          <li>
            <strong>一致性问题</strong>
            <p>多个 Agent 可能产生相互矛盾的结论。应对：明确的共识机制 + 仲裁者 + 冲突检测。</p>
          </li>
          <li>
            <strong>幻觉传播（Hallucination Propagation）</strong>
            <p>Agent A 的错误输出→ Agent B 基于错误信息推理→ 放大错误。应对：关键信息传递时附加来源和置信度；重要中间结果进行交叉验证。</p>
          </li>
          <li>
            <strong>可观测性</strong>
            <p>多个 Agent 的交互轨迹更复杂，调试困难。应对：统一的日志和追踪系统；每个 Agent 的 thought/action/observation 都记录并可视化。</p>
          </li>
          <li>
            <strong>死锁和活锁</strong>
            <p>Agent 之间互相等待或陷入无意义的循环讨论。应对：超时 + 最大轮次 + 心跳检测。</p>
          </li>
        </ol>
      </div>
    `
