<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="LeetCode Hot 100 精选 Python 题解，内置 Pyodide 浏览器代码运行器，覆盖哈希、双指针、DP、树、图等分类。">
<title>LeetCode Hot 100 — Python Practice</title>
<link rel="stylesheet" href="assets/leetcode.css">
</head>
<body>

<div class="list-page" id="list-page">
  <div class="list-header">
    <h1>LeetCode <span class="hot">Hot 100</span></h1>
    <div class="subtitle">一百道精选算法题 · Python 题解 · 浏览器内直接运行</div>
    <a href="index.html" class="back-link">← 返回 Study Hub</a>
  </div>
  <div class="list-progress">
    <div class="bar"><div class="fill" id="progress-fill" style="width:0%"></div></div>
    <div class="label" id="progress-text">已完成 0 / 100 题</div>
  </div>
  <div class="list-toolbar">
    <input class="search-input" id="search-input" placeholder="搜索题目或编号" />
    <div class="diff-filters">
      <button class="diff-filter active" onclick="setDiffFilter(this,'all')">全部</button>
      <button class="diff-filter" onclick="setDiffFilter(this,'Easy')">简单</button>
      <button class="diff-filter" onclick="setDiffFilter(this,'Medium')">中等</button>
      <button class="diff-filter" onclick="setDiffFilter(this,'Hard')">困难</button>
    </div>
  </div>
  <div class="list-body">
    <nav class="cat-sidebar" id="cat-sidebar"></nav>
    <div class="problem-list" id="problem-list"></div>
  </div>
</div>

<main class="main" id="main-content" style="display:none">
  <div id="problem-view"></div>
</main>

<script src="assets/leetcode-data.js"></script>
<script src="assets/leetcode.js"></script>
</body>
</html>
